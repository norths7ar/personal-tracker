# 支出分类
支出:
  餐饮:
    - 蔬果粮油
    - 零食饮料
    - 堂食
    - 外卖
  交通:
    - 停车费
    - 加油充电
    - 保养修车
    - 火车飞机
    - 打车租车
    - 公交地铁
  购物:
    - 日常家居
    - 生活家电
    - 数码电子
    - 个护美妆
    - 服饰运动
    - 其他
  医疗:
    - 药店买药
    - 医院
  住房:
    - 维修清洁
    - 水电燃气
    - 租房物业
  通讯: 
    - 话费
    - 订阅服务
    - 平台会员
  旅行:
    - 景点门票
    - 美食特产
    - 酒店住宿
    - 旅行交通
  娱乐:
    - 棋牌桌游
    - 运动健身
    - 电子游戏
  红包:
    - 亲友红包
    - 工作红包
  保险: []
  教育: []
  其他:
    - 其他

# 收入分类
收入:
  薪资: []
  退款: []
  报销: []
  其他: []

# 迁移分类（不参与收支计算）
迁移:
  还款: []
  投资: []
  充值提现: []
  押金: []
  其他: []

# LLM 配置
llm:
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
  temperature: 0.3
  max_tokens: 8000
  timeout: 60
  confidence_threshold: 0.75

# 饮食追踪配置
diet:
  # 餐顿类型
  meal_types: ["早餐", "午餐", "晚餐", "零食", "其他"]
